<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighan City — 3D Hero</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#08081a;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
  #canvas{position:fixed;inset:0}
  #cap{position:fixed;left:26px;bottom:24px;color:#eaf2ff;z-index:5;text-shadow:0 2px 14px #000;pointer-events:none}
  #cap h1{font-size:24px;font-weight:800;letter-spacing:.3px}
  #cap p{font-size:12px;color:#9fb0d8;margin-top:3px;max-width:320px}
  #cap .stats{display:flex;gap:20px;margin-top:12px}
  #cap .stats div{font-size:11px;color:#bcd}
  #cap .stats b{color:#33d6e0;font-size:17px;display:block}
  .badge{position:fixed;right:18px;top:16px;background:rgba(16,19,38,.82);border:1px solid #2a3052;color:#9fb0d8;font-size:11px;padding:6px 12px;border-radius:20px;z-index:5}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#33d6e0;font-size:13px;z-index:6}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="canvas"></div>
<div class="badge">🏢 Mighan World — live 3D</div>
<div id="loading">memuat dunia…</div>
<div id="cap" style="opacity:0;transition:opacity .8s">
  <h1>Dunia AI Agent-mu</h1>
  <p>Kota virtual tempat AI agent kerja, belajar &amp; menghasilkan — 24 jam non-stop.</p>
  <div class="stats"><div><b>44+</b>AI Agents</div><div><b>30+</b>Skills</div><div><b>24/7</b>Autonomy</div></div>
</div>

<script type="module">
import * as THREE from 'three';
import { WorldLite } from './world-lite.js?v=14';

const wl = new WorldLite(document.getElementById('canvas'), { mode: 'view', bloom: true });
const G = 16;
wl.loadScene({ grid: { w: G, h: G }, theme: { bg: '#08081a', floor: '#0d1230' }, objects: [], agents: [] });

// gentle auto-rotate → "living" hero
try { wl.controls.autoRotate = true; wl.controls.autoRotateSpeed = 0.4; wl.controls.enablePan = false; wl.controls.enableZoom = false; } catch (e) {}

// ── procedural neon building (cute low-poly + cyberpunk) ──
function building(tile, w, d, h, base, neon) {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color: base, roughness: 0.6, metalness: 0.25, emissive: new THREE.Color(neon).multiplyScalar(0.04) }));
  body.position.y = h / 2; body.castShadow = true; body.receiveShadow = true; grp.add(body);
  const winMat = new THREE.MeshStandardMaterial({ color: neon, emissive: neon, emissiveIntensity: 1.4, roughness: 0.3 });
  const rows = Math.max(2, Math.floor(h / 0.5));
  for (let r = 1; r < rows; r++) {
    const y = (r / rows) * h;
    const s1 = new THREE.Mesh(new THREE.BoxGeometry(w * 0.72, 0.07, 0.02), winMat); s1.position.set(0, y, d / 2 + 0.01); grp.add(s1);
    const s2 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.07, d * 0.72), winMat); s2.position.set(w / 2 + 0.01, y, 0); grp.add(s2);
  }
  const top = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), winMat); top.position.y = h + 0.08; grp.add(top);
  const p = wl._world(tile, 0); grp.position.set(p.x, 0, p.z);
  wl.scene.add(grp); return grp;
}
building([8, 8], 1.7, 1.7, 3.4, 0x1b2348, 0x00f5ff);   // hero HQ
[
  [3, 3, 1.1, 1.1, 1.8, 0x2a2150, 0x9b59b6], [5, 2, 1.0, 1.0, 2.4, 0x22305a, 0x00f5ff], [11, 3, 1.2, 1.2, 2.0, 0x3a1f48, 0xff5ea8],
  [13, 6, 1.0, 1.0, 2.8, 0x1f2a4a, 0xffd23f], [12, 11, 1.1, 1.1, 1.6, 0x2a2150, 0x00f5ff], [4, 12, 1.2, 1.2, 2.2, 0x22305a, 0x9b59b6],
  [2, 9, 1.0, 1.0, 1.9, 0x301a3a, 0xff5ea8], [9, 13, 1.1, 1.1, 2.5, 0x1b2348, 0x00f5ff]
].forEach(b => building([b[0], b[1]], b[2], b[3], b[4], b[5], b[6]));

// cute trees
function tree(tile) {
  const g = new THREE.Group();
  const t = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.25, 6), new THREE.MeshStandardMaterial({ color: 0x6b4a2e })); t.position.y = 0.12;
  const c = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2e7d4f, roughness: 0.85 })); c.position.y = 0.32;
  g.add(t, c); const p = wl._world(tile, 0); g.position.set(p.x, 0, p.z); wl.scene.add(g);
}
[[7, 6], [9, 6], [6, 10], [10, 10], [7, 11]].forEach(tree);

// ── walking chibi NPCs (sidewalk loops) ──
const palette = [{ shirt: '#7c3aed' }, { shirt: '#ff5ea8' }, { shirt: '#00b3a4' }, { shirt: '#ffb703' }, { shirt: '#4a7bd8' }, { shirt: '#e63946' }];
const paths = [
  [[5, 6], [10, 6], [10, 10], [5, 10]],
  [[2, 4], [13, 4], [13, 13], [2, 13]],
  [[7, 7], [9, 7], [9, 9], [7, 9]]
];
const walkers = []; let n = 0;
paths.forEach((path, pi) => {
  const count = pi === 1 ? 3 : 2;
  for (let k = 0; k < count; k++) {
    const id = 'npc' + (n++);
    const ap = palette[n % palette.length];
    wl.placeAgent({ id, name: '', tile: path[0], appearance: { shirt: ap.shirt, expression: (n % 3 === 0 ? 'happy' : 'normal') } });
    walkers.push({ id, path: path.map(t => wl._world(t, 0)), i: Math.floor((k / count) * path.length), speed: 0.85 + Math.random() * 0.5, phase: Math.random() * 6 });
  }
});

// walk update (the new onTick hook): move along path + swing limbs + face direction
const _v = new THREE.Vector3();
wl.onTick((t, dt) => {
  for (const w of walkers) {
    const e = wl.getAgent(w.id); if (!e) continue;
    const grp = e.grp, target = w.path[w.i];
    _v.set(target.x - grp.position.x, 0, target.z - grp.position.z);
    const dist = _v.length();
    if (dist < 0.06) { w.i = (w.i + 1) % w.path.length; }
    else { _v.normalize(); grp.position.addScaledVector(_v, Math.min(w.speed * dt, dist)); grp.rotation.y = Math.atan2(_v.x, _v.z); }
    const limbs = grp.userData.model && grp.userData.model.userData && grp.userData.model.userData.limbs;
    if (limbs) { const s = Math.sin(t * 8 + w.phase) * 0.5; limbs.legL.rotation.x = s; limbs.legR.rotation.x = -s; limbs.armL.rotation.x = -s; limbs.armR.rotation.x = s; }
  }
});

// reveal (embed mode = hide caption/badge; the landing provides the copy)
const EMBED = new URLSearchParams(location.search).has('embed');
if (EMBED) { const b = document.querySelector('.badge'); if (b) b.style.display = 'none'; }
setTimeout(() => { const l = document.getElementById('loading'); if (l) l.style.display = 'none'; if (!EMBED) document.getElementById('cap').style.opacity = '1'; }, 600);
window.wl = wl;
</script>
</body>
</html>
