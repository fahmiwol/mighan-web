<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — Mighantect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portal/css/portal.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h1>🚀 Mulai Gratis</h1>
  <p class="subtitle">Buat akun dan dapatkan 500 API calls gratis</p>

  <button class="btn btn-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Daftar dengan Google
  </button>

  <div class="divider"><span>atau</span></div>

  <form id="registerForm" onsubmit="return handleRegister(event)">
    <div class="form-group">
      <label>Nama</label>
      <input type="text" id="name" placeholder="Nama Anda" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="nama@email.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimal 8 karakter" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary">Buat Akun</button>
  </form>

  <p class="auth-footer">
    Sudah punya akun? <a href="/login">Masuk</a>
  </p>
</div>

<div id="toast" class="toast"></div>

<script src="/portal/js/portal.js"></script>
<script>
function loginGoogle() {
  window.location.href = API_BASE + '/api/v1/auth/google';
}

async function handleRegister(e) {
  e.preventDefault();
  var name = document.getElementById('name').value;
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;

  var result = await api('/api/v1/auth/register', {
    method: 'POST',
    body: JSON.stringify({ email: email, password: password, displayName: name })
  });

  if (result.ok && result.data.token) {
    setToken(result.data.token);
    showToast('Akun berhasil dibuat!');
    setTimeout(function() { window.location.href = '/dashboard'; }, 500);
  } else {
    showToast(result.data?.error || 'Registrasi gagal', 'error');
  }
  return false;
}

redirectIfAuth();
</script>
</body>
</html>
